<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Omnifood</title>
</head>

<body>
    <section class="section-hero">
        <div class="hero">
            <div class="hero-text-box">
                <h1 class="heading-primary">A healthy meal delivered to your door, every single day</h1>
                <p class="hero-description">The smart 365-days-per-year food subscription that will make you eat healthy
                    again. Tailored to your personal tastes and nutritional needs.</p>
                <a href="#" class="btn btn--full margin-right-sm">Start eating well</a>
                <a href="#" class="btn btn--outline">Learn more &rarr;</a>
                <div class="delivered-meals">
                    <div class="delivered-imgs">
                        <img src="./images/customers/customer-1.jpg" alt="customer photo">
                        <img src="./images/customers/customer-2.jpg" alt="customer photo">
                        <img src="./images/customers/customer-3.jpg" alt="customer photo">
                        <img src="./images/customers/customer-4.jpg" alt="customer photo">
                        <img src="./images/customers/customer-5.jpg" alt="customer photo">
                        <img src="./images/customers/customer-6.jpg" alt="customer photo">
                    </div>
                    <p class="delivered-text"><span>250,000+</span> meals delivered last year!</p>
                </div>
            </div>
            <div class="hero-img-box">
                <img src="./images/hero.png" class="hero-img"
                    alt="Woman enjoying food, meals in storage container, and food bowls on a table">
            </div>

        </div>
    </section>

</body>

</html>
